<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0f1216" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="筋トレ記録" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="icon" href="./icons/icon-192.png" />
  <title>Training Log</title>
  <style>
    :root {
      --bg: #0f1216;
      --surface: #171b21;
      --surface2: #1f242c;
      --line: #2a313b;
      --text: #e6eaee;
      --muted: #8a94a0;
      --accent: #7cd68a;
      --accent-dim: #2f5c3a;
      --danger: #e06c6c;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      font-size: 16px;
      line-height: 1.4;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      height: 100%;
      overflow: hidden; /* body自体はスクロールさせない（フッターのガタつき防止） */
    }
    /* ヘッダー／本文スクロール／フッター の3段flex。position:fixed をやめて iOS のガタつきを解消 */
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    /* Header */
    header {
      flex: 0 0 auto; z-index: 20;
      background: rgba(15,18,22,0.92);
      backdrop-filter: blur(8px);
      padding: calc(var(--safe-top) + 10px) 14px 10px;
      border-bottom: 1px solid var(--line);
    }
    .session-bar { display: flex; gap: 8px; align-items: center; }
    .session-bar .date { font-weight: 700; font-size: 18px; }
    .session-bar .loc {
      flex: 1; min-width: 0; background: var(--surface2); border: 1px solid var(--line);
      color: var(--text); border-radius: 10px; padding: 8px 10px; font-size: 15px;
    }
    .session-bar button.icon {
      background: var(--surface2); border: 1px solid var(--line); color: var(--text);
      border-radius: 10px; padding: 8px 10px; font-size: 15px;
    }
    .search { margin-top: 10px; display: flex; gap: 8px; }
    .search input {
      flex: 1; background: var(--surface2); border: 1px solid var(--line); color: var(--text);
      border-radius: 10px; padding: 10px 12px; font-size: 16px;
    }
    .chips { display: flex; gap: 6px; overflow-x: auto; margin-top: 10px; padding-bottom: 2px; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      white-space: nowrap; background: var(--surface2); border: 1px solid var(--line);
      color: var(--muted); border-radius: 999px; padding: 6px 12px; font-size: 13px; flex: 0 0 auto;
    }
    .chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* List */
    main { flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 14px calc(16px + var(--safe-bottom)); }
    .cat-head { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: .08em; margin: 16px 2px 6px; }
    .ex {
      background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
      padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
    }
    .ex.done { border-color: var(--accent-dim); }
    .ex .info { flex: 1; min-width: 0; }
    .ex .name { font-weight: 600; font-size: 16px; }
    .ex .sub { color: var(--muted); font-size: 12.5px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ex .today { color: var(--accent); font-size: 12.5px; margin-top: 3px; font-variant-numeric: tabular-nums; }
    .ex .badge {
      background: var(--accent); color: #0b0f0c; border-radius: 999px; font-size: 12px; font-weight: 700;
      min-width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; padding: 0 7px;
    }

    .empty { color: var(--muted); text-align: center; padding: 40px 20px; }

    /* Bottom nav */
    nav {
      flex: 0 0 auto; z-index: 20;
      background: rgba(15,18,22,0.95); backdrop-filter: blur(8px);
      border-top: 1px solid var(--line);
      display: flex; padding-bottom: var(--safe-bottom);
    }
    nav button {
      flex: 1; background: none; border: none; color: var(--muted);
      padding: 8px 0 10px; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    nav button.active { color: var(--accent); }
    nav .ico { font-size: 20px; line-height: 1; }

    /* Sheet / modal */
    .sheet-backdrop {
      position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,0.55);
      display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .18s;
    }
    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
    .sheet {
      width: 100%; max-height: 92%; background: var(--bg); border-top-left-radius: 18px; border-top-right-radius: 18px;
      border-top: 1px solid var(--line); transform: translateY(100%); transition: transform .22s ease;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sheet-backdrop.open .sheet { transform: translateY(0); }
    .sheet-head { padding: 14px 16px calc(var(--safe-top)/2 + 14px); border-bottom: 1px solid var(--line); position: relative; }
    .sheet-head .grip { width: 40px; height: 4px; background: var(--line); border-radius: 2px; margin: 0 auto 12px; }
    .sheet-head .title { font-weight: 700; font-size: 18px; }
    .sheet-head .close { position: absolute; right: 12px; top: 18px; background: var(--surface2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 6px 10px; }
    .sheet-body { overflow-y: auto; padding: 14px 16px calc(20px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }

    /* Log detail */
    .prev-panel { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
    .prev-panel .label { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .prev-line { font-variant-numeric: tabular-nums; font-size: 15px; padding: 1px 0; }
    .set-row {
      display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--line);
      border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; font-variant-numeric: tabular-nums;
    }
    .set-row .idx { color: var(--muted); font-size: 13px; width: 22px; }
    .set-row .vals { flex: 1; font-size: 17px; }
    .set-row .vals b { font-size: 19px; }
    .set-row button.del { background: none; border: none; color: var(--danger); font-size: 20px; padding: 4px 8px; }

    /* Stepper input */
    .steppers { display: flex; gap: 8px; margin: 6px 0 12px; }
    .stepper { flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 10px; text-align: center; }
    .stepper .cap { color: var(--muted); font-size: 11px; }
    .stepper .val { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; margin: 2px 0; }
    .stepper .val input { width: 100%; background: none; border: none; color: var(--text); font-size: 26px; font-weight: 700; text-align: center; font-variant-numeric: tabular-nums; }
    .stepper .btns { display: flex; gap: 6px; }
    .stepper .btns button { flex: 1; background: var(--surface2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 8px 0; font-size: 16px; }

    .btn-row { display: flex; gap: 8px; }
    button.primary { background: var(--accent); color: #0b0f0c; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; flex: 1; }
    button.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--line); border-radius: 12px; padding: 14px; font-size: 15px; }
    button.ghost { background: none; color: var(--accent); border: 1px solid var(--accent-dim); border-radius: 12px; padding: 12px; font-size: 14px; width: 100%; }

    .field { margin-bottom: 12px; }
    .field label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 5px; }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--line); color: var(--text);
      border-radius: 10px; padding: 12px; font-size: 16px;
    }
    .field textarea { min-height: 120px; font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
    .hint { color: var(--muted); font-size: 12.5px; margin-top: 6px; line-height: 1.5; }
    .row2 { display: flex; gap: 8px; }
    .row2 > * { flex: 1; }

    .toast {
      position: fixed; left: 50%; bottom: calc(80px + var(--safe-bottom)); transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--line); color: var(--text); padding: 10px 16px;
      border-radius: 10px; font-size: 14px; z-index: 60; opacity: 0; pointer-events: none; transition: opacity .2s; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    .list-manage-row { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
    .list-manage-row .info { flex: 1; }
    .list-manage-row .cat { color: var(--muted); font-size: 12px; }
    .list-manage-row button { background: var(--surface2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 6px 9px; font-size: 13px; }

    .seg { display: flex; background: var(--surface2); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
    .seg button { flex: 1; background: none; border: none; color: var(--muted); padding: 10px; font-size: 14px; }
    .seg button.active { background: var(--accent-dim); color: var(--accent); }
    .hist-day { border-left: 2px solid var(--line); padding: 4px 0 12px 12px; margin-left: 6px; }
    .hist-day .d { font-weight: 700; font-size: 14px; }
    .hist-day .l { color: var(--muted); font-size: 12px; }
    .hist-day .s { font-variant-numeric: tabular-nums; font-size: 14px; margin-top: 3px; }
  </style>
</head>
<body>
  <div id="app">
    <header id="header"></header>
    <main id="main"></main>
  </div>
  <nav id="nav"></nav>
  <div class="sheet-backdrop" id="sheet-backdrop">
    <div class="sheet" id="sheet">
      <div class="sheet-head">
        <div class="grip"></div>
        <div class="title" id="sheet-title"></div>
        <button class="close" id="sheet-close">閉じる</button>
      </div>
      <div class="sheet-body" id="sheet-body"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="./app.js"></script>
</body>
</html>
